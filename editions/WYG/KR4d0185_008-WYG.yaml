body:
  text: 王著作集巻八宋王蘋撰震澤記善録憲初至震澤見先生問致知之要曰宜近思且體究喜怒哀樂未發謂之中又曰莫被中字礙只㸔未發時如何憲舉楊文靖公中庸序云聞之伊川不偏之謂中不易之謂庸先生曰是非伊川之言不然則初年之説也昔伊川嘗批吕與叔大臨中庸説曰不倚之謂中其言未瑩吾親問伊川如何其言未瑩伊川荅語甚簡曰中無倚著憲未達先生曰若説不倚須是四旁方言不倚得不倚者中立不倚也伊川問學者顔子所樂何事或曰樂道伊川曰若説顔子樂道孤負顔子鄒志完浩曰吾雖未識先生面已識先生心何其所造之深也憲問顔子非樂道何所樂先生曰心上一毫不留若有心樂道則有所倚著功名富貴固無足樂道徳性命亦無可樂莊子所謂至樂無樂問夫子何以言不改其樂曰自人不堪其憂而言故曰不改其樂問大哉乾元是喜怒哀樂未發時曰元已是生物之始問鬼神是造化之迹如何曰陰陽之功用便是為善則善氣應之為福為惡則惡氣應之為禍非世俗所謂鬼神問明則有禮樂幽則有鬼神况於人乎况於鬼神乎是故知鬼神之情狀此皆以鬼神與人析而言之也曰明底便是禮樂幽底便是鬼神指事故異名非以鬼神與人為二也問吕與叔論大人不失赤子之心赤子未有知識大人智周萬物所謂不失赤子之心者不失其虚明淳一之心而已若銖銖而較之固有不同曰大人何嘗添得來問孔子何不言非禮勿思曰動即思也如情動乎中豈不是思伊川作動箴云哲人知㡬誠之於思志士厲行守之於為曰思曰為蓋兼言之矣問將孔孟之言切要處思索如何曰須是熟㸔語孟玩味咀嚼伊川云若熟㸔語孟亦自有得者此也當時門人有問且將語孟要𦂳處㸔如何伊川曰固是好然若有得終不浹洽蓋吾道非如釋道一見了便從空寂去問學者於知見上日有所進於自得處更無分毫進何也曰自得處豈得分毫進若見則便見明道云才説明日便是悠悠若窮經進學須是日就月將安能􅉐然此正説有所得也學者拈起一處思量須是要便見若悠悠即玩矣若未有見又且放過然思不可苦苦則愈逺問張思叔繹詩此道難將智力求學有所思索是用智力求也曰此言則恍然神悟處不是智力求底學者安能免得不用智力人須求悟悟不求人若靜坐有所得難矣學者體究切不可以文義解釋思叔所謂勸君莫作聰明解也問天地位焉萬物育焉此致中和之效歟曰不必言效致中和則天地以是而位萬物以是而育問伊川説人之生也直是天命之謂性謝顯道云順理之謂直竊謂順理是率性之事天命之性無待於順理也二説異同伊川説上一截顯道説下一截問君子何患乎無兄弟似無差等曰此言有抑揚司馬牛憂無兄弟故以四海之内皆兄弟廣其意問學者若未見天下歸仁且先非禮勿視非禮勿聴非禮勿言非禮勿動從事於此須自見天下歸仁曰固是然自要便見得天下歸仁進學在致知涵養在敬不可廢問至大至剛以直直是順理否曰浩然之氣是自然底不可言順横渠云陽性直而遂陰性翕而受體此可見以直之意如日月有明容光必照問五十而知天命夫四十已不惑若未知天命安得謂之不惑曰知天命是至誠之道則與數參而無待於推數矣伊川亦至此地位先生曰明道猶有謔語若伊川則全無問如何謔語曰明道聞一名公欲解中庸至人莫不飲食鮮能知味有疑遂至笑曰我將謂從天命之謂性便疑了伊川直是謹嚴坐間無問尊卑長㓜莫不肅然問仁人心也而曰以仁存心何也曰學者觀書不可梏於文義詁訓曰以仁存心者但言能體人耳如以辭言雖論語亦有所不通處如曰性與天道性與天道豈有二問學者常患思慮紛擾何以處之曰人心本無思慮多是記憶既往與未來事且如在坐只是有疑欲問畢竟何所思慮事未嘗累人心人心自累於事不肯放耳康節詩既往盡歸閒指㸃未來都俟别枝梧故君子思不出其位問浩然之氣塞乎天地之間曰孟子且如此説耳論其洞達無間又豈止塞乎天地之間而已哉問正䝉云聚亦吾體􅄆亦吾體知死而不知亡者可與言性矣海水凝則氷浮則漚然氷之才漚之性其存其亡海不得而與焉推是足以究死生之説其意如何曰知性即明死生之理性猶水也先生荅問其言甚簡每以經子質疑問難先生只抑揚其聲而義理已明一日問如何是萬物皆備於我憲於言下有省學者須是下學而上達灑掃應對即是道徳性命之理禮記凡為長者糞之禮必加帚於箕上以袂拘而退其塵不及長者以箕自向而扱之試體究此時此心如何耶堯舜揖遜之心即羣后徳讓之心即黎民於變時雍之心且灑掃者誰與應對者誰與其理微矣樊遲問仁子曰居處恭執事敬與人忠雖之夷狄不可棄也學者只是説過試以此言踐履之體究之斯知上達之理矣聖人之道無本末無精粗徹上徹下只是一理先生昔在洛中嘗晚坐張思叔誦逝者如斯夫范元長冲曰此只是道體無窮思叔曰只如此説便不好先生因曰道體有多少般在人如何見須是涵泳方有自得陳齊之長方自言初疑逝者如斯夫每見先達必問人皆有説以見告及問先生則曰若説與公只説得我底公却自無所得憲遂心服師事之一二年間才見先生只問逝者如斯夫先生但云理是如此齊之其後有詩云閒花亂蘂競紅青誰信風光不暫停向此果能知逝者便須觸處盡相應蓋至此方有所自得曽文清公㡬問儒釋異同先生曰公本來處還有儒釋否陳可行戌問立則見其參於前在輿則見其倚於衡先生曰參前倚衡非有物也謂之無則不可陳齊之亦有詩云參倚前衡豈易陳只今便了可相親昔人求劍尋舟跡大似子張書在紳陳了翁作了齋六絶中一聨云仲由行行終身誦張也堂堂帶上書楊文靖公賡其韻造次欲安嗟孰是參前無物若為書皆發明此意而先生之言最為精要先生在館中時范伯達如圭云天下歸仁只是物物皆歸吾仁先生指忩問曰此還歸仁否范黙然其後齊之有詩云大海因風起萬漚形軀雖異暗同流風漚未狀端何若此處應須要徹頭先生説人而不仁疾之已甚亂也非特彼而我之心已先亂矣憲遂退見楊良佐邦弼舉似先生之言楊曰多少該括經子之言皆然是亦作文之妙法楊亦先生之門人以文章登甲第宗杲祭中書舎人吕公文曰深期造道遊戱大千先生曰釋氏只將此理來遊戯更無用處吾儒則欲游泳此理既見了不便休了也顔子聞天下歸仁又問克己之目請事斯語所以游泳此理也中庸茍不至徳至道不凝焉禮儀三百威儀三千亦游泳此理也志於道據於徳依於仁游於藝游是游泳之游既依於仁又游泳此理於六藝之中如無故不去琴瑟皆游於藝之謂也憲問盡其心者知其性也知其性則知天矣此是知之存其心養其性所以事天也此是養之先生曰不然余常問伊川造得到後還要涵養否伊川曰造得到後更説甚涵養盡心知性知天知之至也知之至則心即性性即天天即性性心所以生天生地此言天之形體化育萬物為堯舜禹湯文武者皆此心堯夫自餘吟身生天地後心在天地先天地自我出自餘何足言此之謂也其次則欲存心養性以事天問與天地合其徳與日月合其明曰聖人非以其徳合天地之徳也非以其明合日月之明也聖人之徳即天地之徳聖人之明即日月之明言合者立言不得不如是耳言首出庶物萬國咸寧則以天與聖人混同説晏太易明中有詩云誰道堅髙不易知生來頃刻未嘗離陳齊之以詩荅之若道堅髙未始離誰知此語已成非饒君向此知端的未免猶成我與伊太易意甚不平質之先生先生曰齊之言是先生曰伊川四十以後記性愈進今人年長則健忘豈可不知其故哉伊川涪陵之行過灔澦波濤洶湧舟中之人皆驚愕失措獨伊川凝然不動岸上有樵者厲聲問曰舎去如斯達去如斯方欲荅之而舟已行憲紹興癸亥間獲供灑掃於中書舎人吕公之門公教人大要明是非邪正進退出處辭受取與之義而躬行以盡其性所言備載童䝉訓春秋説故不復録公病日漸乃以書薦於著作王先生曰周憲秀才樸茂可喜有志斯道當自䝉與進未果行而公啟手足公之門弟文清曽公又以書申公之意且勉其行受業二年歸見文清公於上饒首命以紀録所聞先生之言憲竊意先生進將覺斯人退且著之書故未敢私有所論譔先生既没道精微私淑諸人世或未知迄今埀三十年念平昔所聞遺忘多矣因追其緒言一二以示同志乾道壬辰二月甲子信州周憲書逮昔者獲從先生於毗陵震澤嘗問師友之道先生曰師不專在傳授友不專在講習於精神氣貎之間自有相激發處是為善親師友者逮謹識之因觀鄉黨一篇所記從容周旋而已然後知羣弟子所以事夫子用是道也先生今没久矣周子自上饒來出一編以示皆其緒言有益於後學者顧恐徒觀其言而不觀其所以言則於道益逺因以所聞於先生者書之巻末嘗試以是觀之則先生之精神氣貎雖千載粹然有生氣乾道八年壬辰五月六日魯郡曽逮書宋宫教所錄宜之問三教異同先生云聖道無二門户各别因指坐間卓子以指從卓子中間旋運出卓子外放手云二氏既理㑹得便從這裏出去復以指從卓子邊縁旋運入來云吾儒既理㑹得依舊在此行用宜之問如何得合道去先生云須是便理㑹得宜之問如何理㑹先生云直下便是宜之言下有省不覺膝之至地先生止定宜之不令拜宜之問伊川嘗云三頭謂亘古亘今只一箇亦得謂一日一箇亦得此理如何先生云所謂停燈於缸前熖非後熖右紹興壬戌癸亥間先生在毗陵宜之侍教所聞如此右震澤記善録著作王先生平昔與門人荅問辭也先生文集頃已刋之郡庠今復得此遺言於先生之子郡丞大本謹併刻之以示後學云淳熙三年丙申仲冬十有二日蘄春假守施温舒謹識王著作集巻八
