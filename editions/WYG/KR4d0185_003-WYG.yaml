body:
  text: 王著作集巻三宋王蘋撰資中袁先生跋程門諸賢多不甚著書大扺要於涵養特守處用功葢二程夫子教人之法如是也明道嘗云若不能養只是説話伊川因尹和靖説易曰且更涵養莫要輕説及答横渠所論亦欲其全養思慮涵泳義理他日自當條暢今觀著作王先生奏篇遺稿僅存十餘地文不過數則讀之皆温醇平實沈潛藴藉藹然有餘味真得程氏之傳矣楊龜山毎言同門後來成就莫踰吾信伯胡文定亦謂其學有師承識通世務二公非輕於許與者知先生葢深矣予故表而出之以誌先生師友淵源之學寳祐四年嵗次丙辰重陽前三日資中袁萬頃書玉山汪先生跋孟子既没聖學絶講本朝河南二程夫子生於千載之後獨得往聖精微之緒而斯文日以緝熙著作先生早登河南之門學聚問辨得所就正充廣涵養其徳粹然髙宗皇帝中興趙忠簡公相懲荆舒而主伊洛於是河南之門如尹公朱公輩人相繼召用而先生以布衣特招首論親征之舉民情欣悦得民心則格天心三王之治也又論帝王之學將以措諸事業非從事章句之末而已及舉小雅宣王諸詩以為内修政事者乃所以外攘夷狄謂正心誠意而辨其君子小人人主之先務也凡此皆其師門所素講深造義理之頥可舉而底績者也思陵一見以為起草茅而議論如素宦則其踐履純熟足以動寤人主者又可見矣遺言逸事絶無僅有而玩其議論想其辭氣雍容切當自有奕奕照映簡編者則其學豈章句言語而已哉門人記先生貎肅而氣和言簡而義明望之可敬即之可慕可謂不阿矣慤之先曾大父文定公嘗僚於趙忠簡公而講習於著作先生陳齊之亦先生友也今幸覩遺帙不勝咨歎僭識巻末寳祐嵗在夀星立冬日後學玉山汪慤書雝國虞先生跋紹興六年趙忠簡免相陳公輔上疏乞禁伊川學朱内翰在經筵不敢諫胡文定奉祠居衡岳獨上疏封爵邵張二程先生貼黄實薦著作王公與和靖尹公皆伊川門人乞以王公校正中興以來程門後凋之松柏獨胡公尹公著作公而已雖然著作晩際思陵固未能昌其所學然遺名遯世在崇寧不與於屛逐學徒之時潔身事道在紹興又不與於禁斥顓門之日公之學力藴蓄始終全節可謂不負師門矣觀其奏篇論汲黯宇文士及之忠佞牛李朋黨之成破至哉斯言雖千百年可為龜鑑思陵以通儒稱之信哉寳祐五年丁巳立夏日雝國虞兟謹書柯山徐先生跋鼎㓜從父師之訓已知和靖先生以程門之學髙宗皇帝由布衣擢寘經筵鼎今幸備灑掃書堂之役流風遺教鼎與諸生拜賜無斁已而復知此邦有王公是時亦以程門之學召入著作庭猶恨未知公學問言論之詳居數月公之孫思文攜文集見過伏讀數四繼以愾嘆不能自已噫嘻炎精寳祚程氏之學廢而㡬熄程氏之學興而復然不特嘆二先生能守其師之學抑以嘆髙宗之所以再造國家與吾儒所以關涉於國家者其學如此之大云景定二年嵗舍辛酉至節後十日柯山後學徐鼎謹書天台毛先生跋自馬上得之之説行君則曰事干戈之時也道學乎何庸臣則曰執干戈之時也道學乎何言嗚呼曷不視此哉﨑嶇金革一聞守臣之薦則惟有道者是信是使不曰徐議其任也懇切奏疏一惟師學之明必欲以道而立政立事不曰姑舎所學也是誠明良之盛際修攘之大原茲炎興所以祀夏配天而衍萬億年之休歟咸淳二年丙寅七月望天台後學毛鼎新書鶴皋朱先生跋南渡以來囘洛學之春二三君子力也著作先生為後凋之松實最其間今覩遺稿醇實雅度如弁冕秉珪於廟堂之上使人一見歛袵而敬心生焉以蕪辭述盛徳則奚其敢咸淳十年甲戌永嘉後學朱子昌敬書眉山黄先生跋自一貫曰唯之後羣弟子各以其親傳之學仕列國厥後罔有聞知亞聖繼興闡揚斯道埀絶復續寥寥千載天啟炎宋五星聚奎諸儒繼出背項相望一時聲稱日光玉潔跨漢軼唐文治與道學由此而盛中間不幸各立門户相勝相非於議論之間致使士習風靡或歸於朔或附於川或從於洛支分𣲖别不復㑹歸於皇極之源小人乗間抵巇大倡偽學之謗荏苒嵗月貽禍國家幸而天不閟道二程門人尚存胡尹暨著作王先生者落落晨星理學流委僅存一綫使先生不遇思陵未免埋光晦彩終其身㡬與草木同腐豈不重可惜哉愚也生於叔世萍寓呉門每恨生晩不及遊先生之門且聞先生之為人又知先生之所學嘗味其功名富貴道徳性命皆不足樂之語且與顔曽氣象相似可以振薄俗可以藥士心惜平道不傳於後文不著於世雖獲用於一時在先生亦姑云爾吁天耶人耶愚不得而知也時祥興改元戊寅嵗仲春三日眉山晩學生黄大有拜手謹書王著作集巻三
