body:
  text: 王著作集巻二宋王蘋撰寅冬上殿劄子一臣聞書曰天視自我民視天聴自我民聴故民之所欲天必從之孟子謂得乎丘民而為天子凡以上之所為視民之所向而已比者淮甸有警陛下决意親征詔下之日民情欣恱此無他當於人心而已夫民離而聴之則愚合而聴之則聖古語謂謀從衆則合天心謂其衆心之所同有至公之理存焉臣願陛下推是心以見於用人則用人皆慰人望推是心以施於政事則政事不咈於人情三王之治不過於得人心而已二臣竊謂人主好惡其猶天歟天之所發生肅殺固無容心於其間是以人主法天而為治賞善罰惡惟才是用曾何適莫焉其於臣下也愛而知其惡憎而知其善然後用人不失其宜矣茍知其人之善矣雖或憎焉未嘗廢也知其人之惡矣雖或愛之未嘗蔽也昔汲黯之戇嘗面折人主漢武毎惡其妄發及與嚴助論之必以黯為社稷臣宇文士及之佞也唐文皇嘗愛之延入閤語毎至夜分及稱佳木文皇必以佞人目之二君之不蔽於好惡之私故能盡其臣下之能否陛下憂勤庶政急於為治然百執事之列毎患於乏才焉臣願陛下察臣下之忠佞捨短取長隨才器使各當其職乃無乏才之患矣三臣聞孔子曰吾志在春秋孟子曰春秋天子之事也則春秋者誠經世之大法也然諸儒棄經任傳使聖經之㫖闇而不彰鬱而不發故王通謂三傳作而春秋散豈不信然側聞陛下萬㡬之暇留意春秋誠得進徳之要矣然臣竊謂帝王之學與世儒之學異蓋世儒之學從事於章句之末解析文義而已至於聖人經世大法往往莫之察也而帝王之學在得其至措諸事業此其所以異也昔九方臯之相馬也物色牝牡有所不察而卒能得天下馬葢視其所視而遺其所不視也臣愚竊謂此言雖小可以喻大春秋之學有類於是伏望陛下深求作經之㫖自得於言意之表而不惑於先儒之偏見則春秋之㫖昭然矣應詔論事奏狀右臣准尚書吏部牒備坐都省劄子正月十三日三省同奉聖㫖今來江北敵馬已退應行在及從便職事官各條具利害聞奏者臣謹按六月宣王北伐之詩也而詩序有及鹿鳴四牡皇皇者華常棣伐木以至於湛露彤弓菁菁者莪焉夫鹿鳴之燕嘉賔四牡之勞使臣皇皇者華之遣使常棣之燕兄弟伐木之燕朋友故舊如魚麗美萬物盛多南陔孝子相戒以養何預於北伐哉及觀車攻之詩稱宣王能内修政事外攘夷狄復文武之疆土復㑹諸侯於東都乃知攘夷狄實係於政事之修舉也又觀禹之戒舜曰無若丹朱傲惟慢遊是好以舜之聖其不為慢遊又何疑焉而禹之陳戒乃至於如是者蓋臣之於君所以告戒者惟恐其有所不及以此見其愛君之至也然則人臣之事君可不法於斯乎臣竊謂今日政治之本有三而已一曰正心誠意二曰辨君子小人三曰消朋黨三者既至則外患不足慮也何謂正心誠意記曰欲明明徳於天下者先治其國欲治其國者先齊其家欲齊其家者先脩其身欲脩其身者先正其心欲正其心者先誠其意然則治天下國家以至於脩身皆本於正心誠意而已蓋誠者天之道也意與天合則動靜語黙不以毫髪已私間於其間無適而非道矣心其有不正乎舉而措之事業疑無難也故記曰治天下有九經所以行之者一也以九經之多該括萬事而謂行之者一也所謂一者何也亦曰誠而已昔舜舞干羽於兩階七旬有苗格以有苗之逺夷負固不服而舞干羽於兩階乃能格之則誠之所感豈有逺近之間哉莫見乎隠莫顯乎微不可不察也何謂辨君子小人蓋君子小人若氷炭之異不可以並用也君子曰可則小人必曰不可君子曰然則小人必曰不然君子以為是則小人必以為非其相戾如是而欲其共成治功難矣彼之不同非故為不相侔也以其智識之大小見聞之廣狹此則喻於義彼則喻於利此則上達彼則下達何自而能一之哉觀齊侯伐魯展喜犒師對齊侯曰小人恐矣君子則否又觀晉陰飴甥之對秦伯曰小人慼謂之不免君子恕以為必歸則君子小人不同也常若是可不辨之哉何謂消朋黨昔唐文宗嘗歎曰破河北賊易破此黨難當時牛李之黨互相傾軋四十餘年臣竊以為當時之黨雖起於牛李而文宗實成之也蓋朋黨之成破係於人君之取捨爾茍文宗不以為黨則臣下孰從而成之乃歎曰破河北賊易破此黨難是未知夫黨之所以成實生於文宗之疑心而小人因此以成之耳一有所疑則親戚故舊謂之朋黨可也交遊執友謂之朋黨可也宦學相從謂之朋黨可也茍以是數者推之孰非朋黨乎又況近年以來宰相數易則人臣之立於朝門戸衆矣掊擊多門同於大公惟才是用而無彼此之間則盡善矣此朋黨不可不消也惟陛下正心誠意以辨君子小人而消朋黨之所自臣竊以為今日艱難之時茍此三者既正則其餘不勞而正矣臣區區之心實願陛下萬㡬之暇留意於此謹録奏聞伏候勅㫖夘三月二十四日面對劄子一臣聞道一而已何古今之異乎昔韓愈作原道嘗曰堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武周公文武周公傳之孔子孔子傳之孟軻或見而知之或聞而知之若合符節其揆一也則前聖後聖其所傳者豈拘於方册之間哉所謂傳聖人之道者非傳其道也傳其心也非傳聖人之心傳己之心也人之心擴而充之可以參天地可以贊化育茍不能充之則亦梏亡之矣故治天下國家必本於正心誠意焉主於一身則為心心有所感則為意心既正矣意其有不誠矣乎帝王之治未有不本於此者逮及秦漢則異於是秦任法律既失其本所以治功終不近古也譬之鑑焉明則塵垢不止止則不明也伏惟陛下留意學問固已黙契於二帝三王矣臣前所謂正心誠意者既已得之推此以决庶政以待羣臣無非誠意視彼秦漢之君以智術馭下何其淺也然湯之盤銘曰茍日新日日新又日新則湯之聖徳在於日新不已也伏望陛下慎終如始亹亹不已則聖徳日新天下幸甚取進止二臣竊觀易之否泰二卦考其成卦之由泰則内君子而外小人否則内小人而外君子以泰通之時於小人非能絶之也特外之而已自古願治之君未嘗不欲辨君子小人也而所進者未必君子所退者未必小人其故何哉昔章子通國皆稱不孝而孟子從而禮貎仲尼賢於堯舜而魯人以為東家丘夫人之好惡之相去豈直尋常之間哉葢物我異觀是非相埒彼君子曰吾之所好者君子也所惡者小人也其小人亦曰吾之所好者君子也所惡者小人也則君子小人又孰從而辨之及考泰之初爻稱拔茅茹以其彚征吉象曰志在外也以此見君子逢時則出而有為也至否之初爻稱拔茅茹以其彚貞吉亨象曰志在君也君子不用退處草野而猶曰志在君者以此見君子之心惓惓不忘於君也及觀需之六四曰需于血出自穴以隂柔而居三陽之上小人在上之象也必至於見傷然後出於穴焉穴者陰之所安也則小人於進退之際可見矣至否之六二曰包承小人吉蓋小人之志所包蓄者在順承於上以求濟其否為身之利而已豈復顧於國家天下哉昔趙充國漢將之忠於國家者也嘗曰明主可為忠言又曰是何言之不忠也又曰非公家忠計也則知君子之於國家未嘗不盡其忠也李林甫居相位十九年固寵市權欺蔽天子耳目自是諫諍路絶卒成天寳之禍則知小人之於國家未嘗為忠謀也由是觀之君子小人之分在夫忠與不忠之間爾陛下任賢使能以圖中興之治而臣區區之心猶以是言之者葢以小人難退而易進茍可以乗間而入必用其智巧願陛下常加察焉取進止五月七日面對劄子一臣聞乾之彖曰保合太和乃利貞然後繼以首出庶物萬國咸寧則必保合其太和之氣然後能首出庶物之上而萬國皆寧也泰之象曰后以財成天地之道輔相天地之宜以泰通之時所以財成輔相於天地者豈智力所能及哉亦全其至和之氣而已由是觀之人君所以贊天地之化育者惟在於勿傷其和氣而已陛下學造精微徳配天地所以贊化育者固已得之矣然臣愚竊謂天地之大四海之廣有匹夫匹婦不被其澤者皆足以傷於和氣又況今日軍興賦斂之繁州縣督責於民間者非一豈無愁歎之聲以傷於和氣哉陛下不可不察也願毎留聖慮以召和氣天下幸甚取進止二臣聞鄭子産從政一年輿人誦之曰取我衣冠而褚之取我田疇而伍之孰殺子産吾其與之及三年又誦之曰我有子弟子産誨之我有田疇子産殖之子産而死誰其嗣之以子産之為政尚及三年然後民信而愛之則知為政之道欲民之信服必在久於其職也今之郡守監司以二年成資已不久矣其間又有席不暇煖而易之者欲民之信服其政其可得乎臣愚竊謂除授郡守監司初宜慎擇及畀付之後勿數移易使得各盡其材而無茍且脱去之心庶㡬治功得以及民伏望陛下加察幸甚取進止九月一日面對劄子一臣聞和氣之在天下猶元氣之在一身也保和氣者其國治保元氣者其生全故人恃元氣以生所以保養之者其精在於喜怒哀樂之際而其粗在於飲食起居之節有天下者恃和氣以為治所以培䕶之者其微在於心術之感通而其著在於百姓之休戚此不可不察也昔東海殺孝婦而旱顔真卿辨獄而雨以匹婦之寃與獄之情乃能感動如是而況天下百姓之休戚乎比年軍旅之興兵食之費取足於東南固所不得已也然監司守令茍逃譴責以不恤者謂之辦事以殘忍者謂之敢為能以赤子為念者有㡬如和糴軍儲和賃舟船之類名為情願實是抑勒未易以一二數也詔令叮嚀非不切至然終不能革者其弊在監司守令不得人耳使監司守令得人則百姓受實恵矣亦不在詔令之數下也近者有詔銓量監司郡守已嘗有罷黜者天下曉然皆知徳意之厚然其間宜罷而幸免者亦不少矣至於縣令尚未有澄汰甄别之法此正今日之急務也元元埀命於縣令可不為之慮乎伏望陛下萬幾之暇令二三大臣講求所以旌别澄汰縣令之方使民安於業而頌聲興則和氣充溢豈復有愁歎之苦哉取進止二臣嘗謂為治之本在於定國是國是定則人心正人心正則風俗厚昔楚荘王問於孫叔敖曰寡人未得所以為國是也叔敖曰國之有是衆所惡也夫國之所是乃至公之理君子之所同也而叔敖曰衆之所惡者何耶葢天下之善人少而不善人多此正論所以難勝也惟能審其是非示以好惡使知所嚮以定國是則人孰不歸於正乎今日之國是尚有可言者焉臣願陛下毎留聖慮天下幸甚取進止納宰相劄子一蘋聞大臣事君以人則宰相在於知人而善任使耳然似是而非者有之似非而是者有之如章子通國皆稱不孝而孟子為之禮貌仲尼賢於堯舜而魯人以為東家丘其似非而是有如此者如殷浩隠於山林謝尚王濛候其出處以卜興衰而庾翼乃謂此曺可束之髙閣其後終不能成功其似是而非有如此者所以知人為難焉自非知道者未易究此伏惟執事深得此道發於事業以濟中興之治而蘋區區猶以是言之者葢至誠無息惟不息則能合内外之道内外之道合則孰能間之哉推於知人宜無難矣不識僕射相公然之否也二竊謂人君毎惡朋黨而人臣毎成於朋黨至於小人之傾君子也亦必以朋黨而去之蓋人主之於臣下賢則進否則退初無心於其間也故臣下之為朋黨未嘗不惡之也人臣之執其政柄者固非有意於為朋黨也然分别邪正茍失於過甚則不幸而近似之矣而小人者乗此以中傷於君子則必曰非其黨不用故造為疑似之謗以傾之而君子往往以是去矣伏惟執事以公忠直道簡在上心固無偏私矣然近年以來宰執數易士大夫之立於朝者門户衆矣伏望執事掊擊多門同於大公則人才短長皆不棄矣蘋區區之心非謂其有此也蓋将逆慮其未至爾夫子之道忠恕論中庸論天下之達道而終於所以行之者一也中庸之書是為入徳之要其言乃曰一而已疑若不以斯道示人也豈欲驁天下後世而不使之有知乎蓋道本無在惟造道者能出於言意之表超然自得有契於心則萬善兼該不待博觀而泛取也故夫子以一以貫之告於曾子而曾子應之曰唯則固已默識之矣及門人之問則告以夫子之道忠恕而已信乎忠恕足以盡夫子之道也然既曰一矣而曽子以忠恕言之何哉忠恕之名既分果可謂之一乎忠以處已恕以接物則忠恕非一也忠以事上恕以濟衆則忠恕非一也自其末而求之則忠恕未嘗不二自其本而求之則忠恕未嘗不一夫盡己之謂忠推己之謂恕所謂盡己者豈有意於為忠耶克己之私一毫不留大其心以體天下之物廓然無際而心無有外非盡己而何天地之造化與之同流矣萬物之散殊與之同體矣舉斯心以加諸彼烏往而非恕乎則恕之為用豈外於忠哉是忠恕者合内外之道爾斯道也聖人體之君子行之體之者從容中道大而能化故發於言也亦不見其迹焉行之者方且勉進於是故必顯其入徳之由所以夫子言一以貫之而曾子語門人必及於忠恕者告之以入徳之由也葢夫子之言有徳之言也有徳之言所言皆己之所有也曾子之言造道之言也造道之言賢人之言聖人之事也欲由而未至也然率是以往其入聖域也必矣則曾子稱夫子之道何疑焉其後曽子傳之子思子思筆之於書亦曰忠恕違道不逺豈非有得於斯乎夫子之門自顔淵死之後門弟子於聖人之道信之篤得之深行之力守之固未有如曾子者其稱夫子之道宜其異於衆人也以子貢之智足以知聖人猶以聖人為多學而識之未達夫一貫之理及聖人語之而後知則曾子之言非造道者能之乎題論語後讀者須求聖賢所以言反覆玩味優㳺涵泳期於黙識心通洞達無間然後為學若祗循習詁訓解析文義適足為玩物爾崇寧三年甲申嵗九月十八日題送李子勉序子路問強夫子告以南北方之强而縱言至於和而不流中立而不倚國有道不變塞焉國無道至死不變皆以强矯之士之特立獨行至死不變亦可以無愧矣進徳至此亦不可以有加矣夫子又謂士不可以不𢎞毅強即毅也何待於𢎞哉而子思稱孔子之聖必曰寛裕温柔足以有容發强剛毅足以有執乃能溥溥淵泉而時出之信知𢎞毅之不可偏也李子勉余畏友也剛直不屈言行必求合於古人與人合如膠漆不可復解不合不能忍見雖忤大臣拂流俗曾莫之顧然有意為之末若無心而適當直前不顧未若應之從容余嘗有意於斯而未能願與子勉共進之故書以告焉紹興六年嵗在丙辰四月望日長樂王蘋序跋陳諫議書後諫議先生忠言至論為時蓍龜雖愚夫愚婦皆知尊仰至於業履之精微通於神明葢人有不得而盡知者觀諫議為龍舒公求銘書辭意勤懇必誠必信雖字畫之末悉盡其至傳曰君子無所不用其極於諫議見之矣紹興十三年五月二十六日長樂王蘋謹題題張思叔書後張思叔世為夀安農夫思叔自幼已不樂為農家子凡三易業始遊庠序即有能文聲及屢試禮部不偶乃㝠心進取有求道之志是時伊川先生歸自涪陵遂受業以終身焉先生之門晩進甚衆然得之多行之力未有能及思叔者思叔明敏疎通學問深造真有用之才也偶於箧中得思叔書二紙惜其中年而亡為之悵然因録其詩文五篇於後亦可以見思叔所學矣紹興二十一年辛未立秋日長樂王蘋題答吕舎人書居仁蘋自前年冬罷官毗陵即還村落復以賤累疾病相仍去冬山妻不幸傷悼之切殊不能堪以此不獲為記室問然懷仰徳義朝夕台誨感佩不勝舎人日與道俱想聰明才智不能為胷次累也老氏謂為學日益為道日損損之又損以至於無此舎人所深曉也於道既得之則聖人所以齋戒所以退藏於密所以和順於道徳者皆不過此齋戒者若顔氏之心齋是矣未始有回方能如是所謂宻者意必因我有一尚存則不宻矣如荘生謂未始出吾宗釋氏謂鬼神窺覷不見者乃宻也既如是則於道徳未有不和順者所過既化則所存者神爾神初無二也學者所造未至於極則不能無先後之序自志學至於立於不惑至於知天命皆其序也故不成章則不能達子思云行逺必自邇登髙必自卑不以躐等為貴也人與仁異孟子以學者分此故謂仁乃人也能體合之即道也孟子以人與仁與道未嘗異也學者正欲合之爾天生烝民有物必有則如耳目者物也能視聽者則也心主於身不存則放矣性則養之爾二者學者之事故謂之事人逺䝉下問不敢不報然詞拙理暗不勝愧汗王著作集巻二
