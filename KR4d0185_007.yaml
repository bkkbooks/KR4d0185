body:
  text: 王著作集巻七宋王蘋撰著作與尹和靖講易乾象慈溪本云偏言則一事偏字為是或本云徧言則一事乾文言天下文明慈溪本云天下見其文明之化也或本云見其文明而化之焞所収本見其文明而化之乾元者始而亨者也慈溪本云既始則亨或本云既始則必亨既始則必亨為是師九二慈溪本云恃專制失為下之道或本云恃專則失為下之道焞所収本無制字小畜彖慈溪本云加曰字者皆重卦名或本云加曰字者皆重卦名同人彖慈溪本云必與人同力乃能濟焞所収本與此本同或本云必與人同乃能有濟大有九三慈溪本云公當亨於天子或本云公當用亨於天子焞所収本必用亨通於天子謙彖慈溪本云抑髙舉下損過抑不及或本云抑髙舉下損過抑不及焞所収本損過益不及恐抑字是臨六五慈溪本云是不自任其知大矣焞所収本是不自任其知則其知大矣或本云是不自任其知則其知大矣大畜慈溪本云諸爻則惟有止畜之義或本云諸爻則惟為止畜之義焞所収本則惟為止畜之義大過九五慈溪本云得過極之陰焞所収本無以字或本云以過極之陰咸彖慈溪本云誠慤之義堅慤之義或本云誠慤之義堅慤之意恒初六慈溪本云居常之始或本云居恒之始焞所収本居恒之始家人慈溪本云至於天下治治天下之道或本云至於天下治天下之道焞所収本至於天下解六三慈溪本云曰作易者其知盜乎或本云曰字作謂字焞所収本作謂字損六三慈溪本云醇謂濃厚厚猶精一也或本云醇謂濃厚猶精一也焞所収本醇謂濃厚濃厚由精井彖慈溪本云無喪無得其徳也往來井井其用也用常也固也井之道也或本云無喪無得其徳也常往來井井其用也周常也周也井之道也焞所収本無喪無得其徳也常往來井井其用也周常也周也井之道也歸妺九四慈溪本云以無悔故為愆期之義或本云以無應故為愆期之義焞所収本以無應故為愆期之義王著作集巻七
