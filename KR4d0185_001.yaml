body:
  text: 王著作集卷一宋王蘋撰薦上殿劄子權發遣平江府臣孫佑劄子據府學生陶孝友等保舉布衣王蘋學行竊惟主上親乘戎輅臨幸本府軍務之暇延見人材今有賢士近在數十里間有憂時愛君之心有開物成務之學素行髙潔朝野共知伏望特賜敷奏召赴行在審察録用候指揮紹興四年十一月二十五日三省同奉聖㫖布衣王蘋令入內內侍省引見上殿上殿聖語除官賜出身十二月四日引見進對十二月五日三省同奉聖㫖昨日上殿王蘋特與補右迪功郎十二月九日三省同奉聖㫖王蘋特賜進士出身授左迪功郎除祕書省正字日下供職十一日內殿宰執呈王蘋辭免特賜進士出身祕書省正字劄子聖語上曰王蘋起於草茅而議論進止若素宦於朝通儒也大抵儒者能通世務乃為有用儻才無所長何所用耶臣鼎曰陛下聖人人臣能否何所逃耶臣與求曰儒者不通世務是謂腐儒如漢公孫𢎞董仲舒倪寬此三人皆名儒故史稱其通當世之務臣松年曰治天下安用腐儒惟通世務乃為有用上曰誠如卿等言耳敕詞一敕右迪功郎王蘋朕於一時人材茍其名字稍有以自見則往往至屢試而治不加進於是從而求其所未試者至於巖穴之士庶幾有稱朕意焉爾學有師承親聞道要韞櫝既久聲實自彰行誼之修溢於朕聽燕見訪聞辭約而㫖深師友淵源朕所嘉尚乃命錫之髙第職是校讐豈特為儒者一時之榮蓋將使國人皆有所矜式勉行爾志無愧師言可特授左迪功郎守祕書省正字紹興四年十二月敕詞二敕左迪功郎守祕書省正字兼史館校勘王蘋可特授左承奉郎依前祕書省正字兼史館校勘紹興五年二月敕詞三敕左承奉郎祕書省正字兼史館校勘王蘋熙豐尚經義而廢春秋崇觀行舍法而罷科舉使自信篤學之士無以售於有司爾獨守遺經不追時好昔人所謂為人臣子而不可不知者爾既知之矣是用特起布衣擢居東觀嘉此老成之望藹然英俊之躔爰自校讐俾參撰述益思懋勉嗣有褒升可特授依前左承奉郎祕書省著作佐郎紹興六年八月敕詞四敕左承奉郎新差權通判常州軍州兼管內勸農事王蘋紹聖元符之間姦人得志首陳紹述之說以脅持上下次為廢立之議以誣謗宣仁傷泰陵孝治之風失神祖勵精之意凡是羣邪之舉措皆非當日之本心貽患至今餘風未殄載觀舊史實駭豫聞爰命儒臣復加筆削以爾蘋親見大儒得其要妙維此一代之典遂為不刋之書增秩之榮厥有故實尚思奮勵朕不爾遺可特授左宣義郎差遣如故紹興八年五月敕詞五敕王蘋汝咸以儒學擢在道山比贊相臣纂修巨典凡筆削之去取兼載不遺核朱墨之異同咸得其當按指事實録之法彰辨是與非之明備一代之成書詔萬世而埀憲首嘉事領之績可忘紬繹之勞恭覽奏篇歎美無斁故兹奬諭想宜知悉紹興九年十月王著作集卷一
