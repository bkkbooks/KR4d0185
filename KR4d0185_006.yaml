body:
  text: 王著作集卷六宋王蘋撰立祠劄子承信郎新差監寧國府南陵縣酒稅務王德文劄子右德文不避蕭斧之誅輒瀝衷忱冒干威聽德文曽大父通判蘋家本福唐僑寓震澤執經伊川之門紹興四年知平江府孫公佑以學行薦特令布衣上殿奏對稱旨聖語有曰王蘋起於草茅若素宦於朝通儒也始命初品越一日復賜出身繇小著倅毗陵國史有傳有文集語解記善録行於世程門名流如胡文定尹和靖張思叔三先生相與講道遺帖可考陳唯室曽文清皆門弟也惟是抱負不克盡施賫志以沒葬於湖州長興縣和平鎮茅栗山門户衰落家叔左藏正埀改秩而遽亡家兄帥幹斗文雖掇乙科尚遲合頴德文碌碌不武弗振厥紹俱不能發揚潛耀實負愧恧幸遇判府節制待制侍郎先生宗主斯文維持正道凡前輩明義理之學者莫不褒表而顯揚之至若近日唯室先生許祠於學闔郡嘆詠扶植名教之意甚盛甚休唯室師曽大父者也且蒙崇奬則為師者當俾與唯室並祠何榮如之然則薦於朝者前使君孫公也祠於鄉者今判府侍郎實齋先生也異世一轍千古兩賢九原有知當必效亢回之報矣冒犯峻嚴德文下情無任戰灼俟命之至右謹具申呈伏候台旨嘉熙元年七月闕日承信郎新差監寧國府南陵縣酒稅務王德文劄子台判王著作乃程門髙弟他郡猶為之立祠況生長之郡乎送學議行實齋王先生立祠祭文維嘉熙元年嵗在丁酉八月己卯朔初八日丙戌朝奉大夫煥章閣待制知平江府兼節制許浦顧涇水軍王遂謹以清酌庶饈之奠致告於著作先生王公唯室先生陳公遂竊惟渡江百年東南士大夫免淪於荆舒之烈焰而獲遊於伊洛之春風者二三君子之力也著作先生以正論動上聽唯室先生以直指開人心其有功於世教宏矣郡有陸宣公以下祠敬奉二先生以祔使是邦之人家識正學戶知正理顯然淵源之所出其自今始尚饗郡庠先賢位次唐陸宣公贄字敬輿德宗朝大參魏國范文正公仲淹字希文丞相許國范忠宣公純仁字堯夫元祐名臣周國范恭獻公純禮字彞叟樂圃朱先生長文字伯原教授鄉學監司郡守以不接見為恥著作王先生蘋字信伯程門髙弟郡守王遂立唯室陳先生長方字齊之寓崑山著作王先生門人江陰軍學教授侍郎王公㬇字原缺丞相岐公圭孫華陽人中興紹興年重建郡庠忠節滕公茂實字秀穎奉使不失節吳守淵立文穆范公成大字致能賢勞四方正字周公南字南仲吳縣人慶元名臣博學無所不通清毅陳公塏字子爽浙西憲使寓嘉興宋理宗御筆清節髙風勉勵流俗安定胡先生瑗字翼之泰州海陵人教授蘇湖二學丞相魏國文正王公旦字子明魏州人三槐王氏和靖先生尹肅公焞字彥明洛陽人伊川髙弟虎丘讀書象山先生陸文安公九淵字子靜撫州金溪人知荆門慈湖先生楊文元公簡字敬仲象山門弟苑橋讀書知溫州右史倪公千里字原缺教授吳學有惠諸生周國正惠趙公希澤字原缺守吳觀文趙公與􅊸字原缺開闢學校鄉飲酒性學李教授添立大德五年太子中允陸公元朗字德明注釋六經延平先生李公侗字願中南劍州劍浦人水心先生葉公適字正則龍山人丞相文忠富公弼字彥國河南人參政歐陽文忠公修字永叔吉水永豐人東坡先生蘇文忠公軾字子瞻眉山人開府富公嚴字原缺青田人以刑部郎中守鄉郡所居以德夀名之鶴山先生魏文靖公了翁原缺原缺左丞許公平章髙公掌祠府帖軍府據府學時中齋生王思文狀曽大父著作蘋執經伊川先生之門親傳正學紹興四年六龍南渡行幸吳門郡侯孫公佑以學行薦令布衣上殿奏對稱旨聖語有云王蘋起於草茅議論若素宦於朝通儒也蒙賜進士出身遷至著作國史有傳及語解文集記善録行於世有如胡文定尹和靖張思叔三先生遺帖可考陳唯室曽文清皆門弟子也前政實齋閣學王先生下車之初首以吾鄉六君子為問以䇿於學念先著作及唯室祠祀未備繪像並祠於郡庠德至渥也今唯室之孫陳之諒首祈請於判府史尚書月有奉祠之賜學有掌祠之職其他先賢之後亦各有之獨是曽大父之祠缺然有愧思文蒙前政江府教僅與沾汚微俸得尾殿祭之後思文一介么麼粗安義分不敢躁求靖惟著作門人之後既已得職儻不控陳實維暴棄茲蓋恭遇判府發運提領節制待制侍郎先生道傳孔孟業紹伊周幸陶教育之恩久被作成之澤乞照先著作門人陳唯室先生孫陳之諒例幫給使府奉祠職事奉前政判府魏侍郎台判庫呈一日繼據公使庫單子具呈照得掌祠官月支錢三十貫十七界官會所據府學掌祠學生王思文申乞幫支請給奉前政判府魏侍郎台判索掌祠帖呈仍契勘掌祠俸有無髙下又據公使庫單子據王思文稱見充掌祠未曽給帖提督官書擬王掌祠據稱未曽給帖然而著作之像既祠於學則與陳唯室事體一同合不合照例月給俸仍給帖奉前政府判府魏侍郎台判牒學保明府司已牒府學契勘去後今承府學申繼送前郡契勘呈今據正録直學鄉貢免解進士學生許東發等狀申蒙送下府牒為王祕校思文乞支月錢事東等照得王思文見肄業本學時中齋其先世著作見祠於學今據所陳欲就使府給帖支幫月錢東發等保明詣實中乞備申使府取自指揮施行奉台判本學既與保明合與照朱祕校例支自六月為始須至行遣右今帖府學時中齋生王思文仰充王著作掌祠先具遵稟狀申淳祐六年閏四月闕日帖從事郎兩易平江府觀察推官吳迪功郎特兩易平江軍節度推官蔡宣教郎差充僉書平江軍節度判官廳公事趙承議郎添差通判平江軍府事余承議郎通判平江軍府事暫領府事郭庭堅台押李提刑芾行學問立祠因依申狀貢補進士掌著作祠學生王思文狀右思文伏蒙師旨備凖提刑提舉節制祕閣判部侍郎先生取問立祠因依者伏念思文曽大父蘋字信伯世居福之福清遊學寓居平江師事伊川先生視龜山楊先生為後進龜山先生獨深許可之每以為後來師門成就者惟信伯也紹興四年駐蹕吳會軍務之暇延見人材郡守孫公佑特薦於朝布衣王蘋近在數十里間有憂時愛君之心開物成務之學素行髙潔朝野共知特賜審察録用遂蒙賜對第一劄論得人心足以合天心第二劄論人主不可蔽於好惡之私第三劄論人主學春秋與世儒異玉音有曰王蘋起於草茅而議論進止若素宦於朝通儒也賜出身授迪功郎祕書省正字又詔條敵退利害一曰正心誠意二曰辨君子小人三曰消朋黨會修神宗皇帝實録書成改左承奉郎史館校勘後集古今論語説取其與所見合者為一書亦未及而卒今家孰有福清刋行文集蘄春刋行論語集解震澤記善録兼國史有傳可考出處纍贈中大夫實齋王先生來鎮吳門首以吳郡六君子以䇿多士嘉熙元年八月九日與門弟子唯室陳先生長方並祠於學祭文有曰竊惟渡江百年東南士大夫免淪於荆舒之烈焰而獲遊於伊洛之春風者二三君子之力也著作先生以正論動上聽唯室先生以直指開人心其有功於世教宏矣郡有陸宣公以下祠敬奉二先生以祔使是邦之人家識正學戶知正理顯然淵源之所出其自今始思文藐焉寡學獲叨奉祠之職又蒙教養作成之賜而奉遺像焉謹具狀申謹狀咸淳元年五月闕日貢補進士掌著作祠學生王思文狀王著作集卷六
