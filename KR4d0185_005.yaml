body:
  text: 王著作集卷五宋王蘋撰像贊冲乎其融慤乎其恭杏壇化雨程門春風洛陽王敬方鄉先生著作王公小象其十一世從孫觀奉以示寬瞻拜之餘謹為之贊曰嗟乎先生負笈而求道已為北學之言游獻䇿以救時又為南渡之陸贄故當誣史重作雖秉筆而預修然使新學尚行終抱經而不試才可用而有為行獨持而無愧是宜祭於其社以慰鄉邦之思豈私於其家以為子孫之庇也哉延陵吳寬程學之傳孰得其親載之而南龜山是因著作及門視楊則後德器之成乃參其舊著作閩産而家於吳淵源一脉鄉邦所模遺象儼然如挹先哲座上之風門前之雪鄉後學王鏊受性理之學於程門究筆削之㫖於孔氏語其體則正心修身措之用可更化善治惜乎時君徒稱其為通儒而不任以國事然後之學者泝道學之正傳跡出處之髙致宜其於先生企仰之有加而誦法之不置也耶郡後學李傑跋按宋史著作王先生生於南服奮然北遊得聞大學之說於伊川之門屬高宗南渡拜官於戎事倥偬之秋而所以獻納於君者拳拳以正心誠意及分别君子小人為言雖當時仕不甚顯弗克表見於世然其所學者大而少枉以徇人亦於此可見矣瞻拜遺像凛然起敬因識於後漳浦吳原書墓志道學衰微千有餘載士習於章句傳注孰有心傳自到者憲自髫齡已聞河南二程夫子紹孔孟之絶學私淑諸人獨恨不得供灑掃應對之役問所以學也既冠居吳則聞州里福清王先生實程門髙第乃與吾季弟哲又閩陳長方少方執門弟子之禮薰蒸灌溉於仁義道德之言若江海之浸雖莫測其涯涘然知師道可尊朋友講習可樂也先生諱蘋字信伯世居福之福清自其考徙平江先生資禀清粹充養純固平居恂恂儒者及語當世之務民俗利病若習於從政者蓋其理達而義精故也然不邀名當世世罕知之今天子急賢圖治搜揚巖穴俊乂彚征知府事孫公佑列先生學行於朝召見賜進士出身除祕書省正字先生於是冀得行其道以所學為上言曰道無古今惟人能𢎞故堯以傳舜舜以傳禹禹以傳湯湯以傳文武或見而知或聞而知前聖後聖若合符節然非傳聖人之道傳其心也已之心無異聖人之心廣大無垠萬善皆備盛德大業由此而成故欲傳堯舜禹湯文武之道擴充是心焉爾又曰帝王之學與儒生異尚儒生從事章句文義帝王務得其要措之事業蓋聖人經世大法備在方䇿茍得其要舉而行之無難也未幾兼史館校勘屬刋修裕陵實録書奏改左承奉郎遷著作佐郎丐外補通判常州主管台州崇道觀族子坐法一時觀望文致以罪久之還故官復主管崇道觀引年致仕官至左朝奉郎壽七十有二紹興二十三年五月戊午疾終於里第以其年八月甲申葬於湖州長興縣和平鎮茅栗山之原嗟乎先生所試止於是故見之行事不大彰徹道學淵微不得暴之天下然一時名儒推與論薦亦可槩見楊文靖公時程門先進嘗曰同門後來成就莫踰吾信伯中書舍人朱公震寶文閣直學士胡公安國徽猷閣待制尹公焞皆舉以自代胡公論薦尤力謂其學有師承識通世務使司獻納必有補於聖時是二三公蓋有心照莫逆之道存焉先生純一不雜故得之深不事表暴故所養厚貌肅而氣和言簡而義明故望之可欽即之可愛慕其接物意誠而感通其治事從容而中理其從政必盡其職其涖民必極其惠豈非所謂時措之宜者耶曾祖諱珣祖諱礎皆隱君子考諱伯起假承務郎贈右宣教郎室蔡氏胡氏前卒俱贈安人胡氏欽州安逺尉嶧之女安逺名士女又賢也以配先生士以為美談三子曰大本右修職郎淮南東路安撫準備差使曰大中曰大臨皆業儒女二人壻皆進士嗚呼夷考世儒之學自先秦兩漢更魏晉涉隋唐窮經探道號稱名儒者不乏然韓愈氏顧以為孟軻氏不得其傳下到今若河南氏之學若先生所受學逺有端緒質之孔孟無愧也其學要以深造自得敏於躬行其序自正心誠意以至修身齊家治國平天下要本於格物致知自盡己之性以至盡人物之性極於參天地贊化育要本於至誠不息達於禮樂則可以窮神知化擇乎中庸則可以開物成務然士無師傳以肄業考疑往往不得其門而入雖然後生可畏焉知來者無渙然氷釋於斯道先生既葬修職以狀來曰先君未嘗著書所以傳後者惟幽堂之銘是賴子從先君遊久子實甚宜憲義不得以淺陋辭也謹次其狀且具列古今之學可考不誣蓋有待於來者銘曰聖人跡熄經僅存章句傳注極絲棼衰微絶塞道之真剽剝鬭儷攻於文卓哉夫子闖聖門學得其承道乃尊不雜不溺醇乎醇相時行義覺斯民胡神嗇此畀窮屯我述墓文琢斯珉諗兹源委埀無垠聞而知者存乎人門人浦城章憲撰祭文維紹興二十三年嵗次癸酉八月戊午朔初十日丁卯門人章憲謹以清酌庶羞之奠致告於著作王先生之靈曰嗚呼聖人既沒六經雖備學失其傳泯泯千嵗有倬河南興起廢墜世方驚疑青襟還視不驚不疑髦士雲萃猗歟先生清明淵懿乃泳於深乃躋於邃不雜不溺乃得其粹私淑諸人河南是繼滔滔者學孰窮涯涘孰致中和孰合內外孰脫章句見之行事學得其源究觀其委如立之平以平斯市不惑多歧卒習於是哲人云亡斯學墜地先生非隱亦非玩世相時行可庶幾得志志舉斯道匪曰膴仕斯命也夫身屯道否念昔從遊東阡西里從先生者陳子兄弟同升諸堂亦有吾季二十年間流落殆既晚及師門弔影掩袂奚為於今師亦長逝嗚呼哀哉自我不見於今三祀馳書未復訃音遄至呼天不弔慟哭於位溫溫郁郁墮此窈冥諄諄循循不聞其聲陳此奠觴輤車其行終天之恨併此以傾尚饗挽詩伊洛流風在邱軻道德尊遺經啓幽眇後學有淵源鑽仰知由戶衰遲阻及門三年思睟面一旦絶微言行義時逢可澤民事却睽斯文猶有寄俗學豈終迷不復符三鱣空聞見白雞誅茅方檇李卜葬已苕溪先生亦酉年捐館故用晉書白雞故事西觀才黔突題輿却佐州濟時卑管晏齎志在春秋曖曖孤雲沒沉沉厚夜幽升堂聞禮樂終覺愧程仇門人浦城章憲伊洛親聞道淵微賴發揚東吳賢望重西觀舊書藏吾黨將安放斯文豈遂亡堂堂寧復見門士慟新岡梁木俄摧壞嗟吁喪大賢典刑看子肖道學付誰傳一代風流盡千年物論先師言猶在耳身敢墜周旋門人浦城楊邦弼國史傳王蘋字信伯世居福之福清自其考始寓平江蘋師事河南程頤視其髙第龜山楊時為後進而時獨深許可之每以為後來師門成就者惟蘋也上親征駐蹕知平江府孫佑薦其學行召見之蘋曰民離而聽之則愚合而聽之則聖古語謂謀從衆則合天心以衆心之所同有至公之理也今陛下親征詔下而四方民大和悅當於人心耳陛下誠推是心以見於用人則用人必慰人望推是心以見於政事則政事不咈於人情故曰愛而知其惡憎而知其善使朝廷不乏才要道也汲黯之戇漢武每惡其妄發及與嚴助論之必以為社稷臣宇文士及之佞唐文皇每延入閣語必至夜分至稱佳木乃以佞人目之二君不蔽於好惡此所以能盡臣下之賢否人主好惡猶天焉惟才是用何適莫之有上他日語輔臣曰蘋起草茅而議論若素宦於朝通儒也賜進士出身授左迪功郎祕書省正字詔條具賊退利害蘋曰六月宣王北伐之詩也而詩序及於鹿鳴四牡皇皇者華常棣伐木湛露彤弓菁菁者莪焉此亦何預於北伐哉及觀車攻之詩稱宣王能內修政事外攘夷狄然則攘夷狄實係於政事之修也今日政治之本有三一曰正心誠意二曰辨君子小人三曰消朋黨記曰欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意治天下國家本於正心誠意而已誠者天之道也意與天合則動靜語默無毫髮私而此心無適非道矣舉而措之事業宜無難也君子之與小人如氷炭之不可並用也君子曰可小人曰不可君子曰然小人必曰不然其相戻若是欲望其共成功難矣然彼之所不同非故不相侔也以知識之小大見聞之廣狹不同耳齊侯伐魯展喜犒師對齊侯曰小人恐矣君子則否晉隂飴甥對秦伯亦曰小人戚謂之不免君子恕以為必歸然則可不辨之哉唐文宗嘗歎曰破河北賊易破此黨難蓋是時牛李之黨互相傾軋四十餘年而文宗不知當時之黨雖起於牛李而實成於文宗之疑也惟人君以為疑故親戚故舊人得以謂之黨交遊執友人得以謂之黨宦學相同得以謂之黨門生故吏得以謂之黨朋黨之成破係於人君取舍使文宗不以為黨臣下孰從而成之㑹修神宗皇帝實録兼史館校勘書成改左承奉郎遷著作佐郎通判常州主管台州崇道觀纍官左朝奉郎卒年七十二蘋識慮精微議論平易平居頽然若與世忘及語當世之務乃如習於從政者在常州人以為不屑於簿書錢榖也蘋鈎考不懈必舉職乃已或叩之曰子欲我為不解人事耶不著書既老乃集古今論語說取其與所見合者為一書亦未及而卒吳郡志王蘋字信伯父仲舉福州福清人蘋出繼伯父伯起後伯起字聖時居吳江震澤少入京師受經於王介甫學文於曾南豐遊曾宣靖公公亮父子間舉進士不第題其居曰酉室江公望為記平生所作詩曰唱道野集伊川程先生在涪陵及洛陽命蘋從遊遂為河南髙第蘋學通春秋視楊時猶為後進時亦謂後來師門成就者惟蘋也舍法行遂不就舉紹興四年高宗駐蹕平江知府孫佑言蘋素行高潔有憂時愛國之心有開物成務之道丞相趙鼎以聞十二月召對上以通儒稱之補右迪功郎後四日特賜進士出身除祕書省正字兼史館校勘受詔條具賊退利害蘋奏治本三事一曰正心誠意二曰辨君子小人三曰消朋黨上謂輔臣曰蘋起草茅而議論進止若素宦於朝者大抵儒者能通世務乃為有用與修神宗實録優詔奬諭中書舍人朱震寶文閣直學士胡安國徽猷閣待制尹焞皆舉以自代安國論薦尤力謂其學有師承識通世務使司獻納必有補於聖時遷著作佐郎通判常州主管台州崇道觀然為秦檜所嫉會從子誼坐法一時觀望文致以罪久之復主管崇道觀引年致仕官至左朝奉郎二十三年五月卒年七十二葬湖州長興縣和平鎮茅栗山門人章憲撰志蘋識慮精微議論平易頽然若與世忘不著書既老集論語集解未成合文集為四卷行於世憲及陳長方楊邦弼皆同門弟子也嘉熙元年知府王遂祠蘋學宫寶祐初里人立像震澤以長方邦弼配食號三賢祠陳長方字齊之其先福州長樂人父侁字復之擢第娶吳人林旦女與陳了翁交從甚密了翁謫廉州侁以書賀之至千餘言由此得罪又從遊定夫學深得治氣養心行已接物之要故其子皆生長外家亦為道學之士長方紹興進士終江隂軍學教授居吳中步里終日閉户研窮經史著書名步里客談及春秋禮記尚書傳漢唐論俱行於世學者稱為唯室先生弟少方字同之亦端慧不羣孝宗朝為東宫講官時號二陳皆王信伯門弟楊邦弼字良佐其先建寧浦城人文公億四世孫也來從王蘋學遂居震澤探極理趣發為詞章中紹興十二年進士第三會行都初建太學選為博士踰年通判信州尋以大理卿改湖南漕不務鈎致甚得大體遷祕書丞著作佐郎又兩遷禮部郎以起居舍人出使金國遷起居郎中書舍人而卒章憲字叔度居黃村樂道好德操履高潔行有餘力而以學文鄉里謂之隱君子其學師事王信伯而與朱發吕居仁等游邃於春秋有後軒集十卷曾文公為之序憲父甫字端叔自建徙居吳其八世祖本浦城人有西村珠林二族西村之裔多顯仕珠林至甫曾祖法始登科嘉熙元年詔舉䇿題問禮云凡學釋奠於其先師釋者援周禮曰凡有道者有德者使教焉以為樂祖祭於瞽宗此之謂先師之類也若是則豈必鄉之先生而後敬之仕於其邦寓於其里者皆所當然也師道立善人多豈不宜乎若文正范公生於斯仕於斯樂圃朱公唯室兄弟皆長於斯私淑艾於斯若安定胡公教授是邦和靖尹公講道虎邱之下著作王公召於吳而老於吳是六君子者雖事顯晦之不同非吳之所謂先師歟非吳學之士所當嚴事而景行者歟愚請誦所聞於六君子之一二與諸友訂天章之對規模正大隱然有王佐氣象答元昊書心事明白西賊膽寒之謡豈語言文字使之然者其居吳也義學義莊遺愛猶在其守吳也興學校舉賢才此又公之餘事爾安定泰山十年攻苦食淡明道景祐間振師道於久廢之餘其授學蘇湖也東南之士翕然有仁義禮樂之風四方來游者醇厚和易不問知為其弟子而經義治事本末兼舉異時出而為政往往適於世用慶厯間自太學而州縣一是為法二公本朝之大儒也敢問其學問之本果安在歟使文正經制西事歸坐廟堂安定久侍經筵進當事任其經世大用亦可逆覩歟樂圃以名父之子得師訓之傳有是言則是理明無是言則是理闕又曰心通乎道然後能辨是非伊川直指內外之學以告之者可謂切至著書閲古樂堯舜之道以終其身而郡守監司造請政則亦非泊然忘斯世者和靖紹師魯之高風為師門之曾子義不茍後棄子弗顧經以解而明亦以解而晦先生此言豈以辨說章句為功者論孟二解言近指逺有非游楊諸公之所及虎邱之集闡明道奧開發後學之蔽䝉二公程門之高弟也敢問讀其書習其說者何所得歟使樂圃早嵗俯從吏仕晚而久在朝廷和靖渡江之召從容講席其所養所施亦可悉聞歟高宗駐蹕吳㑹首以郡守之薦召見王公布衣入對若素宦於朝上以通儒目之賜第入館以治本三說應詔一曰正心誠意二曰辨君子小人三曰消朋黨此正師友言治之要㫖而中興祈天永命之大端也於時唯室與少方學於震澤實以王公為師語録一編備天下之妙理若逝者如斯授受於不言之表至觸處相應之時而後自得焉二公亦中興以來之端人也而郡不知尊學不知祀何歟六君子之淵源至於今未逺也尊其名而不考其實敬其人而不繼其學獨何益歟近世紫陽夫子起於諸老之後是邦之負笈而受業寓書而請益者亦十有餘人諸友亦嘗紬繹其說而有得焉否乎其與六君子之學異乎同乎亦有互相發明者乎願詳以告之文無取焉王著作集卷五
