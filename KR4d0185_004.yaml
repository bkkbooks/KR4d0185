body:
  text: 王著作集卷四宋王蘋撰文定胡先生書一安國頓首頃在行闕多所奉教方欲再造問信已以罪行矣既渡湘水之西山居自省相望數千里無緣復通聲息懷思可量去此見報伏審賜對受知置瀛館豈特交遊之私慶也已辱書貺欣承校正多餘德履增福未期晤集切兾順時為此道自衛不宣安國頓首信伯學士先生執事二安國再啓一别三十年光既及而學不至回省初心旦夕自愧每聞德譽想造養之益深也信伯既親見伊川丈人入其堂奧責任亦不輕矣使斯道遂行邪説不得以汩之也直有望於君勉之安國再啓和靖尹先生書一焞頓首啓前月特蒙寵顧以病軀不得欵奉教益為恨繼辱賜書併録示定夫所撰其叔父墓銘顯道書先生易傳後捧領披讀感愧之心有不勝言專使至承惠翰荷眷豫不忘甚幸甚幸焞即此逺依庥庇諸事粗遣腰痛亦減七八不煩過慮曽憲來寓虎丘日獲相見或云可居旬日車馬聞欲來此遂得欵聽益論未間尚兾為斯文自重懇切懇切使還專奉啓起居兼謝下情不周焞頓首再拜録示易傳差互且據焞所收本寫呈乞檢至更望訂其是非他俟面議焞再拜二焞頓首啓向寓虎丘時蒙寵顧極荷眷豫之勤去秋遇髙隱辱館待至厚拜别之久日益瞻仰承惠問獲聞動靜感慰兼集即日大暑伏惟尊體萬福焞去年冬末來會稽凡事安集不敢有煩逺念末由拜會惟乞為斯文倍加保重以副願望真切謹専附手啓上問不周焞頓首再拜六月二十四日謹空三焞再啓自至會稽以退間不修講人事不遇便人故久不得上問必能深察向承教論語二事今已改正或更有未定處有的便無惜砭諭朋友切磨之道廢而不講正賴吾信伯也萬望留念顒望顒望貴眷各叶吉慶時暑以保愛為祝小姪墺已受恩今年三月得嶽祠亦薄有祿廩僥幸僥幸亦恐知之焞再拜四焞頓首啓拜違教益兩見改嵗瞻仰之心與日增積仲夏謹時伏惟贊畫之暇尊體萬福焞守拙碌碌隨分而已然平日所聞不敢不遵衰老日甚幸未昏憒不煩過念末由拜會敢兾順時保重前需召除以副友執之願謹專附狀起居不周焞頓首再拜信伯通守學士賢友執事五月十六日謹空五焞再啓近兩收所惠教墨獲聞動靜感慰兼至過荷不忘甚幸甚幸常州往來衝要應接不能不少勞神用在信伯處之必不廢力有暇進道否有學者來講此道否必不倦以告也塊處僻寺向風不勝馳情焞再拜貴眷各惟上下安裕夏暑敢以保愛為請焞上問賤纍特蒙問念感愧之至焞再拜六焞頓首拜啓久違益論日增瞻仰專使至特辱貶教伏審即日按察之暇尊體萬福感慰兼集焞居此幸安諸事粗遣不敢煩念慮未有會期向風馳情秋暑尚炎伏乞順時保重前需大來以副願望下情豈勝拳拳使還謹奉狀起居兼謝不周焞頓首再拜信伯通守學士友舊執事八月上浣日謹空七焞再拜啓邢壻以日到府中不敢草率上狀小姪墺近已娶婦只此中人家老拙又且了此一事伏恐知之皆辱埀問至荷眷與復拜起居禮焞再拜上時主簿紫芝到任未久不通問陳齊之今赴官未嘗通訊否或訪我存亡盡為告之貴眷各叶吉慶敢以保愛為禱焞頓首再拜信伯通守學士道契執事玉山汪先生跋國朝崇重儒學然自布衣聘召者特為難得故侍講侍郎尹公著作崇道王公皆伊川先生髙第又皆用布衣特召師友輝映搢紳榮之尹公致位通顯德望表表而王公立誠為己仕不求進故知之者希然不可以是判優劣也今觀尹公所遺王公尺牘一語一言必以尊所聞務講學相期責善之誠如此則王公之為人可知己蓋嘗以為國家之患常由人心之偏陂而邪説暴行之肆熙豐紹符所以基靖康之禍也惟儒者則有正人心息邪説距詖行放淫辭之功焉紹興初年懲創前轍隆儒勸學人主特有意焉尹公以經學納誨所以格君心者媺矣王公討論史觀破紹聖元符誣謗之諼慝明宣仁泰陵慈孝之本心其功亦不細凡此皆正人心之偉節也用乂厥辟肇開中興豈偶然哉然格心之學難明而遜志之言易孚此世道消長所以相推而不已也厥後權姦秉國蠱上志賊人心天下泄泄斯道幾墜幸賴乾道淳熙諸公相與扶持考其師友淵源則出於河南之門者為多信乎功不在禹下也然尹公年譜但載陳公輔之見詆而不察其反覆蓋自趙忠簡用朱子發范元長於資善堂時以為極天下之選朱嘗乞官謝顯道之子其奏疏推明伊川以為實繼孔孟不傳之緒尹之被召命陳之除吏部郎則皆以范薦也陳首論王安石學術之害乞數數禁切且言臣初無所知未免從事王氏學既而心知其非每自感悔遂除司諫又言有見今被舉其文學行誼實為可稱而尚在逺方遲遲未來者乞下有司多方禮請已而忠簡去位所引用多罷去惟朱以上眷獨存公輔復上言廷臣有私意取程頥之説謂之伊川學者偽為大言謂其實繼孔孟頥實何人將見淺俗僻學惑亂天下伏望睿斷擇羣臣有為此學者皆屛絶之於是朱公亟求去上堅留之尹公亦以此辭召命有旨促赴闕陳尋除禮部侍郎既嘗上意不能眩則又請明詔多士今次科舉將安石三經義與諸儒之説並行以銷去偏黨愚考觀至此為之嗟歎信乎任賢去邪之為不易也或者稽韓退之之言謂自古賢者常不遇不賢者比肩青紫賢者常無以自存不賢者志得意滿如程門諸公宜在髙位顧終身運蹇以為造物者好惡與人異余謂不然賢者之所得於造物者養其大體者也不賢者之所得於造物者養其小體者耳吾既得其良貴矣又慕人之所貴已受大又取小其可乎彼妾婦之道不能自樹立而以順為正故膏粱文繡珠翠脂粉以自寵飾而媚於人大丈夫豈慕為之哉古之得志居上位者若堯舜禹湯文武皆不敢以天下為已養菲衣惡食逺色賤貨兢兢業業不敢自暇自逸凡以儉於小體而崇其大體也安冨尊榮孰禦焉先文定嘗獲講習於著作君其曽孫仲可出示尹公帖於是三復有感而書其後帖中所謂時紫芝者善厯學先文定嘗薦之謂其問學淹貫推究詳密及陳齊之長方亦先友也寶祐嵗在鶉尾小滿日玉山汪慤書王著作集卷四
